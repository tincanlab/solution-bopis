# Skill Coverage Declaration - BOPIS Solution Architecture
# Canonical checklist: required vs optional skills and their completion state
# This file is the single source of truth for "are we done?"

version: "1.0"
scope: solution_architecture
description: "Required and recommended skills for SA deliverables in BOPIS initiative"

# ============================================================
# REQUIRED SKILLS (Must complete before cascade advancement)
# ============================================================
required_skills:
  - id: sa-design-validation
    name: "SA Design Validation"
    skill_path: ".opencode/skills/openarchitect/sa-design-validation"
    when: "after solution-architecture outputs exist"
    inputs:
      - "--root ."
    outputs:
      - "architecture/validation/sa-design-validation-report.yml"
      - "architecture/validation/sa-design-validation-report.md"
    gate: "0 errors, 0 warnings"
    status: "completed"
    evidence: "validation passed on 2026-04-30"

  - id: ea-convention
    name: "EA Convention Validation"
    skill_path: ".opencode/skills/ea-convention"
    when: "before advancing cascade state"
    inputs:
      - "--root ."
      - "--repo-url https://github.com/tincanlab/bopis-solution-architecture"
      - "--initiatives architecture/portfolio/initiatives.yml"
      - "--domain-registry architecture/enterprise/domain-registry.yml"
      - "--solution-index solution-index.yml"
      - "--workstreams architecture/solution/domain-workstreams.yml"
    outputs:
      - "architecture/enterprise/domain-registry.yml"
      - "solution-index.yml"
    gate: "0 errors"
    status: "completed"
    evidence: "0 errors, 5 warnings (missing DA layer - expected)"

  - id: solution-architecture
    name: "Solution Architecture Design"
    skill_path: ".opencode/skills/openarchitect/solution-architecture"
    when: "requirements baseline is approved"
    outputs:
      - "architecture/solution/architecture-design.yml"
      - "architecture/solution/architecture-design.md"
      - "architecture/solution/interface-contracts.yml"
      - "architecture/solution/domain-handoffs/**/component-specs.yml"
    gate: "architecture-design.yml + architecture-design.md both exist"
    status: "completed"
    evidence: "All 5 domain handoffs complete, TMF-verified"

# ============================================================
# TECHNIQUE SKILLS (Must complete for quality gates)
# ============================================================
technique_skills:
  - id: nfr-budget-allocation
    name: "NFR Budget Allocation"
    skill_path: ".opencode/skills/openarchitect/nfr-budget-allocation"
    when: "after requirements baseline, before interface contracts"
    outputs:
      - "architecture/solution/nfr-budget-allocation.md"
    gate: "NFR budgets allocated per tier with SLIs defined"
    status: "completed"
    evidence: "Created 2026-04-30, 6 budget categories, 5 domain allocations"

  - id: interface-contract-design
    name: "Interface Contract Design"
    skill_path: ".opencode/skills/openarchitect/interface-contract-design"
    when: "after solution architecture, before validation"
    outputs:
      - "architecture/solution/interface-contract-validation.md"
    gate: "All interfaces have owner, SLO, TMF alignment"
    status: "completed"
    evidence: "9 APIs + 3 events validated, TMF620/622/637/669/687 mapped"

  - id: data-entity-modeling
    name: "Data Entity Modeling"
    skill_path: ".opencode/skills/openarchitect/data-entity-modeling"
    when: "after TMF SID mapping"
    outputs:
      - "architecture/solution/shared-entities.yml"
    gate: "Entities have owner, lifecycle states, TMF SID mapping"
    status: "completed"
    evidence: "7 entities modeled, 5 TMF-verified SID mappings"

  - id: business-process-modeling
    name: "Business Process Modeling"
    skill_path: ".opencode/skills/openarchitect/business-process-modeling"
    when: "after requirements, before DA handoff"
    outputs:
      - "architecture/solution/business-flows.yml"
    gate: "Processes have owner, triggers, terminal states, eTOM mapping"
    status: "completed"
    evidence: "3 processes, 20+ steps, 14 eTOM processes mapped"

  - id: stakeholder-mapping
    name: "Stakeholder Mapping"
    skill_path: ".opencode/skills/openarchitect/stakeholder-mapping"
    when: "during requirements analysis"
    outputs:
      - "architecture/requirements/stakeholders.yml"
      - "architecture/requirements/stakeholder-mapping-report.md"
    gate: "governance_signal.cascade_recommendation == ready_for_review"
    status: "completed"
    evidence: "9 stakeholders mapped, 4 decision gates, 7 open questions"

  - id: use-case-elaboration
    name: "Use Case Elaboration"
    skill_path: ".opencode/skills/openarchitect/use-case-elaboration"
    when: "after requirements baseline"
    outputs:
      - "architecture/requirements/use-cases.yml"
    gate: "traceability to req-* IDs, acceptance criteria defined"
    status: "completed"
    evidence: "7 use cases, 3 actors, golden path + alternate flows"

# ============================================================
# OPTIONAL SKILLS (Recommended but not blocking)
# ============================================================
optional_skills:
  - id: repo-creation
    name: "Repo Creation"
    skill_path: ".opencode/skills/openarchitect/repo-creation"
    when: "before DA handoff"
    outputs:
      - "architecture/solution/repo-creation-request.yml"
      - "architecture/solution/repo-creation-result.yml"
    gate: "execution.state == completed"
    status: "partial"
    evidence: "Request file says completed, but gh CLI unavailable for verification"
    notes: "5 domain repos: domain-ecommerce, domain-inventory, domain-order, domain-party-role, domain-notification"

  - id: quick-start
    name: "Quick Start"
    skill_path: ".opencode/skills/openarchitect/quick-start"
    when: "repo first cloned or reset"
    gate: "canonical artifacts validated"
    status: "not_started"
    notes: "Optional hygiene check"

# ============================================================
# UNAVAILABLE SKILLS (Environment constraints)
# ============================================================
unavailable_skills:
  - id: constraint-validation
    name: "Constraint Validation"
    reason: "MCP enterprise-graph unavailable per AGENTS.md"
    notes: "Enterprise validation skipped - no MCP access"

# ============================================================
# SUMMARY
# ============================================================
summary:
  required: 3
  required_completed: 3
  technique: 7
  technique_completed: 7
  optional: 2
  optional_partial: 1
  unavailable: 1
  completion_rate: "10/12 = 83%"
  blocking_gaps: 0
  cascade_ready: true
