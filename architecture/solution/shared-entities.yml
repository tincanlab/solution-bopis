# Shared Data Entities - BOPIS Solution

## 1. Scope and Boundary

- **Scope**: Solution (SA)
- **Boundary**: bopis (Buy Online, Pick Up In Store)
- **Output Path**: architecture/solution/shared-entities.yml
- **Upstream Source**: architecture/requirements/requirements.yml
- **Reference Model**: TMF SID (Shared Information/Data model)

## 2. Candidate Entities Identified

Based on SID alignment in `architecture-design.yml`:

| Entity | ABE (Aggregate Business Entity) | Owner Domain | Type |
|--------|----------------------------------|--------------|------|
| ProductOrder | Product Order ABE | Ecommerce | Entity |
| CustomerProductOrder | Customer Product Order ABE | Order | Entity |
| CustomerProductOrderItem | Customer Product Order ABE | Order | Entity |
| BusinessPartnerProductOrderItem | Business Partner Product Order ABE | Order | Entity |
| ProductInventory | Product Inventory ABE | Inventory | Entity |
| Store | Geographic Location ABE | Ecommerce | Entity |
| Notification | Notification ABE | Notification | Entity |
| PickupTransaction | Fulfillment ABE | Party Role | Entity |

## 3. Entity Models

### 3.1 ProductOrder (Ecommerce Domain)

```yaml
- entity_id: ent-product-order
  name: ProductOrder
  scope: solution
  owner: ecommerce
  purpose: "Product order reference data from TMF620 Product Catalog"
  identifiers:
    - product_order_id
  attributes:
    - name: product_order_id
      type: string
      required: true
      description: "Unique product order identifier"
    - name: sku
      type: string
      required: true
      description: "Product SKU"
    - name: name
      type: string
      required: true
      description: "Product name"
    - name: price
      type: decimal
      required: true
      description: "Product price"
    - name: store_id
      type: string
      required: true
      description: "Store identifier for pickup"
  relationships:
    - target: ent-product-inventory
      cardinality: many-to-one
      kind: reference
      description: "Product order references inventory at store"
  lifecycle_states: []
  invariants:
    - "sku must be valid and exist in catalog"
    - "store_id must be a valid BOPIS-enabled store"
  data_classification: "public"
  tmf_sid_mapping:
    sid_entity: ProductOrder
    abe: Product Order ABE
    confidence: mcp_verified
```

### 3.2 CustomerProductOrder (Order Domain)

```yaml
- entity_id: ent-customer-product-order
  name: CustomerProductOrder
  scope: solution
  owner: order
  purpose: "Customer product order for BOPIS lifecycle management"
  identifiers:
    - order_id
  attributes:
    - name: order_id
      type: string
      required: true
      description: "Unique order identifier"
    - name: customer_id
      type: string
      required: true
      description: "Customer identifier"
    - name: store_id
      type: string
      required: true
      description: "Pickup store identifier"
    - name: order_date
      type: datetime
      required: true
      description: "Order creation timestamp"
    - name: total_amount
      type: decimal
      required: true
      description: "Total order amount"
    - name: status
      type: enum
      required: true
      description: "Order status: RECEIVED, PICKING, READY, PICKED_UP, CANCELLED"
  relationships:
    - target: ent-customer-product-order-item
      cardinality: one-to-many
      kind: composition
    - target: ent-product-inventory
      cardinality: many-to-one
      kind: reference
      description: "Order items reference inventory"
  lifecycle_states:
    - RECEIVED
    - PICKING
    - READY
    - PICKED_UP
    - CANCELLED
  invariants:
    - "total_amount must equal sum(order_items.amount)"
    - "status transitions must be valid (RECEIVED -> PICKING -> READY -> PICKED_UP)"
    - "cancelled orders must release inventory"
  data_classification: "confidential"
  tmf_sid_mapping:
    sid_entity: CustomerProductOrder
    abe: Customer Product Order ABE
    confidence: mcp_verified
```

