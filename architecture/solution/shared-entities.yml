## 4. Cross-Boundary Ownership

### Entity Ownership Matrix

| Entity | Owner Domain | Reference Domains | Master/Shadow |
|--------|--------------|-------------------|---------------|
| ProductOrder | Ecommerce | Order | Master (catalog) |
| CustomerProductOrder | Order | Ecommerce (reference) | Master (order) |
| CustomerProductOrderItem | Order | Inventory (reference) | Master (order) |
| BusinessPartnerProductOrderItem | Order | Party Role (reference) | Master (order) |
| ProductInventory | Inventory | Ecommerce, Order | Master (inventory) |
| Store | Ecommerce | Order, Party Role | Master (catalog) |

### Synchronization Risks

1. **ProductInventory → Ecommerce**: Inventory visibility sync (event-driven, 30s SLA)
2. **CustomerProductOrder → Party Role**: Order status sync (event-driven, real-time)
3. **Store → All Domains**: Store data is relatively static, cached by consumers

## 5. Lifecycle and State Transitions

### CustomerProductOrder State Machine

```
[RECEIVED] → [PICKING] → [READY] → [PICKED_UP]
                    ↓
                [CANCELLED]
```

**Valid Transitions**:
- RECEIVED → PICKING (associate starts picking)
- PICKING → READY (associate completes picking)
- READY → PICKED_UP (customer picks up, QR verified)
- RECEIVED → CANCELLED (customer cancels)
- PICKING → CANCELLED (associate cancels)

**Emitted Events**:
- Order status events (ifc-order-status-event) on every state transition
- Pickup event (ifc-pickup-event) on PICKED_UP

## 6. Quality Validation

### ✅ Validation Checklist

- ✅ No entity exists without a named owner (all entities have owner domain)
- ✅ Attributes are structured (identifiers, business attributes, audit metadata separated)
- ✅ Relationships have direction and cardinality
- ✅ Lifecycle states are explicit for stateful entities
- ✅ Invariants are documented for critical business rules
- ✅ TMF SID mappings are provided with confidence levels
- ✅ Data classification is assigned (public, internal, confidential)
- ⚠️ **Gap**: No canonical entity artifact in EA layer (this is SA-level)

### Recommendations

1. **Create EA-level canonical entities** when enterprise architecture matures
2. **Add audit fields** (created_at, updated_at, created_by) to all entities
3. **Define retention policies** for confidential data (7 years per nfr-data-retention)

