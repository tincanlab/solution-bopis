# Business Process Model - BOPIS Solution

## 1. Scope and Boundary

- **Scope**: Solution (SA)
- **Boundary**: bopis (Buy Online, Pick Up In Store)
- **Output Path**: architecture/solution/business-flows.yml
- **Reference Model**: TMF eTOM (enhanced Telecom Operations Map)
- **Upstream Source**: architecture/requirements/requirements.yml

## 2. Participants and Triggers

### Actors

| Actor | Role | Participation |
|-------|------|---------------|
| Customer | End user | Initiates browse, order placement, pickup |
| Store Associate | Store staff | Picking, ready-for-pickup, pickup verification |
| System (Automated) | Background processes | Inventory sync, notifications, events |

### Triggers

| Trigger | Type | Initiator | Description |
|---------|------|-------------|-------------|
| Order Placed | Customer action | Customer | Customer places BOPIS order |
| Inventory Changed | System event | Inventory Domain | Inventory level changes (reservation/release) |
| Order Status Changed | System event | Order Domain | Order status transitions |
| Pickup Initiated | Associate action | Store Associate | Associate starts picking order |
| Pickup Completed | Associate action | Store Associate | QR code verified, pickup complete |

## 3. Process Models

### 3.1 BOPIS Customer Journey (Main Process)

```yaml
- process_id: proc-bopis-customer-journey
  name: BOPIS Customer Journey
  scope: solution
  owner: ecommerce + order + party-role
  trigger:
    type: customer_action
    value: customer_browse
  participants:
    - Customer
    - Store Associate
    - Ecommerce Domain
    - Inventory Domain
    - Order Domain
    - Party Role Domain
    - Notification Domain
  preconditions:
    - Customer is authenticated
    - Store has BOPIS capability enabled
    - Product is available in inventory
  steps:
    - step_id: step-browse-products
      action: Browse products
      actor: Customer
      domain: ecommerce
      etom_process: 1.2.7.2.3 (Product Offering Cataloging)
      outputs:
        - product_list
    - step_id: step-check-inventory
      action: Check store inventory
      actor: Customer
      domain: ecommerce + inventory
      etom_process: 1.2.11 (Product Inventory Management)
      outputs:
        - inventory_availability
    - step_id: step-place-order
      action: Place BOPIS order
      actor: Customer
      domain: order
      etom_process: 1.3.3.10 (Manage Customer Order Placement)
      inputs:
        - product_sku
        - store_id
        - quantity
      outputs:
        - order_id
        - qr_code
    - step_id: step-reserve-inventory
      action: Reserve inventory atomically
      actor: System (Order Domain)
      domain: inventory
      etom_process: 1.7.5.4.4 (Managing inventory Transactions)
      outputs:
        - reservation_confirmed
    - step_id: step-send-confirmation
      action: Send order confirmation
      actor: System (Notification Domain)
      domain: notification
      trigger: order_status_event (RECEIVED)
      outputs:
        - confirmation_sent
    - step_id: step-associate-picking
      action: Associate picks order
      actor: Store Associate
      domain: party-role
      etom_process: 1.5.5.8 (Manage Resource Order Fulfillment)
      inputs:
        - order_id
      outputs:
        - status: PICKING
    - step_id: step-ready-for-pickup
      action: Mark order ready
      actor: Store Associate
      domain: party-role
      etom_process: 1.3.3.12 (Manage Customer Order Fulfillment)
      outputs:
        - status: READY
    - step_id: step-notify-ready
      action: Send pickup notification
      actor: System (Notification Domain)
      domain: notification
      trigger: order_status_event (READY)
      outputs:
        - notification_sent
    - step_id: step-customer-arrives
      action: Customer presents QR code
      actor: Customer
      domain: party-role
      inputs:
        - qr_code
    - step_id: step-verify-pickup
      action: Verify QR code
      actor: Store Associate
      domain: party-role
      etom_process: 1.6.8.4.2 (Accept Business Partner Order)
      outputs:
        - verification_result
    - step_id: step-complete-pickup
      action: Complete pickup
      actor: Store Associate
      domain: party-role
      outputs:
        - status: PICKED_UP
    - step_id: step-notify-completion
      action: Send completion notification
      actor: System (Notification Domain)
      domain: notification
      trigger: pickup_event (PICKED_UP)
      outputs:
        - completion_notification_sent
  terminal_states:
    - PICKED_UP (success)
    - CANCELLED (customer cancellation)
    - CANCELLED (system cancellation - inventory issue)
  emitted_events:
    - ifc-order-status-event (order status changes)
    - ifc-inventory-sync-event (inventory reservation/release)
    - ifc-pickup-event (pickup completion)
  compensation:
    - step-cancel-order:
        trigger: customer_cancel | inventory_issue
        action: Release inventory reservation
        domain: inventory
        etom_process: 1.7.5.4.4 (Managing inventory Transactions)
```

### 3.2 Inventory Sync Process

```yaml
- process_id: proc-inventory-sync
  name: Inventory Synchronization
  scope: solution
  owner: inventory
  trigger:
    type: system_event
    value: inventory_changed
  participants:
    - Inventory Domain
    - Ecommerce Domain
    - Order Domain
    - External Inventory Management System
  preconditions:
    - Inventory change detected (reservation/release/adjustment)
  steps:
    - step_id: step-detect-change
      action: Detect inventory change
      actor: System (Inventory Domain)
      domain: inventory
      etom_process: 1.2.11.4 (Ensure Product Inventory Quality)
    - step_id: step-publish-event
      action: Publish inventory sync event
      actor: System (Inventory Domain)
      domain: inventory
      etom_process: 1.7.10.5.1 (Manage Inventory)
      outputs:
        - ifc-inventory-sync-event
    - step_id: step-update-ecommerce
      action: Update inventory visibility
      actor: System (Ecommerce Domain)
      domain: ecommerce
      trigger: ifc-inventory-sync-event
      inputs:
        - store_id
        - sku
        - quantity
    - step_id: step-update-order
      action: Update order inventory reference
      actor: System (Order Domain)
      domain: order
      trigger: ifc-inventory-sync-event
  terminal_states:
    - SYNCED (success)
    - FAILED (retry with dead letter queue)
  emitted_events:
    - ifc-inventory-sync-event
  compensation:
    - step-retry-sync:
        trigger: sync_failure
        action: Retry with exponential backoff
        max_retries: 3
```

### 3.3 Order Lifecycle Process

```yaml
- process_id: proc-order-lifecycle
  name: Order Lifecycle Management
  scope: solution
  owner: order
  trigger:
    type: system_event
    value: order_created
  participants:
    - Order Domain
    - Inventory Domain
    - Party Role Domain
    - Notification Domain
  preconditions:
    - Order created with status RECEIVED
  steps:
    - step_id: step-validate-order
      action: Validate order details
      actor: System (Order Domain)
      domain: order
      etom_process: 1.3.1.2 (Support Customer Order Management)
    - step_id: step-update-status-received
      action: Update status to RECEIVED
      actor: System (Order Domain)
      domain: order
      outputs:
        - ifc-order-status-event (RECEIVED)
    - step_id: step-wait-picking
      action: Wait for associate to start picking
      actor: System (Order Domain)
      trigger: pickup_event (PICKING)
    - step_id: step-update-status-picking
      action: Update status to PICKING
      actor: System (Order Domain)
      domain: order
      outputs:
        - ifc-order-status-event (PICKING)
    - step_id: step-wait-ready
      action: Wait for order to be ready
      actor: System (Order Domain)
      trigger: pickup_event (READY)
    - step_id: step-update-status-ready
      action: Update status to READY
      actor: System (Order Domain)
      domain: order
      outputs:
        - ifc-order-status-event (READY)
    - step_id: step-wait-pickup
      action: Wait for customer pickup
      actor: System (Order Domain)
      trigger: pickup_event (PICKED_UP)
    - step_id: step-update-status-pickedup
      action: Update status to PICKED_UP
      actor: System (Order Domain)
      domain: order
      outputs:
        - ifc-order-status-event (PICKED_UP)
  terminal_states:
    - PICKED_UP (success)
    - CANCELLED (cancellation)
  emitted_events:
    - ifc-order-status-event (all status changes)
  compensation:
    - step-cancel-order:
        trigger: customer_cancel | associate_cancel
        action: Cancel order, release inventory
        domain: order + inventory
        etom_process: 1.3.3.16 (Manage Customer Order Management Report)
```

## 4. Handoffs and Boundaries

### Cross-Domain Handoff Matrix

| Step | From Domain | To Domain | Interface | Handoff Type |
|------|-------------|----------|-----------|--------------|
| Place Order | Ecommerce | Order | ifc-order-management-api | API call |
| Reserve Inventory | Order | Inventory | ifc-inventory-management-api | API call (atomic) |
| Send Confirmation | Order | Notification | ifc-order-status-event | Event |
| Associate Picking | Order | Party Role | ifc-order-status-event | Event |
| Update Status | Party Role | Order | ifc-party-role-api | API call |
| Notify Ready | Order | Notification | ifc-order-status-event | Event |
| Verify Pickup | Party Role | Order | ifc-pickup-api | API call |
| Complete Pickup | Party Role | Order | ifc-pickup-event | Event |
| Update Inventory | Inventory | Ecommerce | ifc-inventory-sync-event | Event |

### Domain Ownership Boundaries

| Process Step | Owning Domain | Responsibility |
|---------------|--------------|----------------|
| Browse Products | Ecommerce | Product catalog, store locator |
| Check Inventory | Ecommerce + Inventory | Real-time inventory visibility |
| Place Order | Order | Order creation, lifecycle management |
| Reserve Inventory | Inventory | Atomic reservation, consistency |
| Notify Customer | Notification | Email/SMS delivery |
| Pick Order | Party Role | Store associate operations |
| Verify Pickup | Party Role | QR code verification |
| Sync Inventory | Inventory | Event-driven channel updates |

## 5. Lifecycle and Operability

### Order State Machine

```
[RECEIVED]
    ↓
[PICKING] ← (associate starts picking)
    ↓
[READY] ← (associate marks ready)
    ↓
[PICKED_UP] ← (QR verified, pickup complete)

[RECEIVED] → [CANCELLED] ← (customer cancels)
[PICKING] → [CANCELLED] ← (associate cancels)
```

### SLA and Timeout Handling

| State | SLA | Timeout Action |
|-------|-----|----------------|
| RECEIVED → PICKING | 30 minutes | Auto-cancel (configurable) |
| PICKING → READY | 2 hours | Alert store manager |
| READY → PICKED_UP | 7 days | Auto-cancel, restock inventory |

### Failure and Compensation Paths

| Failure Scenario | Detection | Compensation Action |
|-----------------|-----------|----------------------|
| Inventory reservation fails | API error response | Return error to customer, suggest alternative store |
| Order creation fails | API error response | Release any partial reservations |
| Notification fails | Retry exhaustion | Dead letter queue, manual follow-up |
| QR verification fails | Invalid QR | Associate re-requests QR display |
| Pickup event fails | API error | Retry with exponential backoff |

